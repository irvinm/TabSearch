<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tab Search & Hide</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div id="permission-warning" class="permission-banner" hidden>
    <div class="permission-message">
      ⚠️ <strong>Permission needed to hide tabs.</strong>
      <span id="permission-guidance" class="permission-guidance" hidden>Firefox will ask you to confirm this. Please click "Keep" when prompted.</span>
    </div>
    <div class="permission-actions">
      <button id="grant-permission-btn" type="button" class="grant-btn">Enable Tab Hiding</button>
      <a id="permission-help-link" href="privacy.html" target="_blank" class="help-link">Why?</a>
    </div>
  </div>
  <form id="search-form" autocomplete="off">
    <div class="search-bar">
      <input id="search" type="text" placeholder="Search term ...">
      <button id="search-btn" type="submit" class="primary-btn">Search</button>
      <button id="audio-search-btn" type="button" class="icon-btn" title="Show tabs playing audio">
        <img src="images/tab-audio-playing-small.svg" alt="Audio playing" width="28" height="28" />
      </button>
    </div>
    <fieldset class="option-group">
      <legend>Search Types</legend>
      <div class="option-list">
        <label><input type="checkbox" id="search-urls" checked> Search URLs</label>
      </div>
      <div class="option-list">
        <label><input type="checkbox" id="search-titles" checked> Search tab titles</label>
      </div>
      <div class="option-list">
        <label class="flex-label">
          <input type="checkbox" id="search-contents"> Search contents of loaded tabs
          <button id="search-contents-info-btn" type="button" class="icon-btn" title="Learn more about content search">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="9" cy="9" r="8" fill="#2366d1" stroke="#2366d1" stroke-width="2"/>
              <text x="9" y="14" text-anchor="middle" font-size="12" font-family="Arial, sans-serif" fill="white" font-weight="bold">i</text>
            </svg>
          </button>
        </label>
      </div>
    </fieldset>
    <fieldset class="option-group">
      <legend>Search Options</legend>
      <div class="option-list">
        <label><input type="checkbox" id="virtual-dashboard"> Virtual Search Results Dashboard</label>
      </div>
      <div class="option-list">
        <label><input type="checkbox" id="realtime-search" checked> Real-time search</label>
      </div>
      <div class="option-list">
        <label class="flex-label">
          <input type="checkbox" id="fuzzy-search"> Fuzzy matching (Titles & URLs)
          <div class="threshold-container" id="threshold-row" hidden>
            <input type="range" id="fuzzy-threshold" min="0.0" max="1.0" step="0.05" value="0.35">
            <span id="threshold-value">0.35</span>
            <button id="fuzzy-info-btn" type="button" class="icon-btn" title="Open Fuzzy Matching Guide">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="9" cy="9" r="8" fill="#2366d1" stroke="#2366d1" stroke-width="2"/>
                <text x="9" y="14" text-anchor="middle" font-size="12" font-family="Arial, sans-serif" fill="white" font-weight="bold">i</text>
              </svg>
            </button>
          </div>
        </label>
      </div>
      <div class="option-list">
        <label><input type="checkbox" id="select-matching-tabs"> Select all matching tabs on close</label>
      </div>
      <div class="option-list">
        <label class="flex-label">
          <input type="checkbox" id="disable-empty-tab"> Disable initial hide action
          <button id="privacy-info-btn" type="button" class="icon-btn" title="Learn more about tab hiding privacy">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="9" cy="9" r="8" fill="#2366d1" stroke="#2366d1" stroke-width="2"/>
              <text x="9" y="14" text-anchor="middle" font-size="12" font-family="Arial, sans-serif" fill="white" font-weight="bold">i</text>
            </svg>
          </button>
        </label>
      </div>
      <div class="option-list">
        <label><input type="checkbox" id="tst-support"> Support for Tree Style Tab (TST)</label>
      </div>
      <div class="option-list tst-suboption" id="tst-auto-expand-row" hidden>
        <label class="tst-suboption-label"><input type="checkbox" id="tst-auto-expand"> <span>Auto-expand trees with matched tabs</span></label>
      </div>
    </fieldset>
  </form>
  <script src="popup.js"></script>
</body>
</html>
